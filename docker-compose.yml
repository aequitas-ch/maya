version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aequitas_db
    environment:
      POSTGRES_USER: aequitas
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aequitas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: aequitas_backend
    environment:
      - DATABASE_URL=postgresql://aequitas:password@db:5432/aequitas_db
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: aequitas_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
