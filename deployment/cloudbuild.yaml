steps:
  # Build the backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aequitas-backend', './backend']

  # Push the backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aequitas-backend']

  # Deploy the backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aequitas-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aequitas-backend'
      - '--region'
      - 'europe-west6'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # Build the frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aequitas-frontend', './frontend']

  # Push the frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aequitas-frontend']

  # Deploy the frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aequitas-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aequitas-frontend'
      - '--region'
      - 'europe-west6'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/aequitas-backend'
  - 'gcr.io/$PROJECT_ID/aequitas-frontend'
