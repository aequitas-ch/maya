name: Deploy to Cloud Run

on:
  push:
    branches:
      - test
      - prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    environment: test
    if: github.ref == 'refs/heads/test'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west6-docker.pkg.dev --quiet

      - name: Build Backend Image
        run: docker build -t europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-backend-test:${{ github.sha }} ./backend

      - name: Push Backend Image
        run: docker push europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-backend-test:${{ github.sha }}

      - name: Derive Backend Secret Key
        id: backend-secret-test
        env:
          SECRET_SOURCE: ${{ secrets.DJANGO_SECRET_KEY || secrets.GCP_CREDENTIALS }}
        run: |
          BACKEND_SECRET_KEY=$(printf '%s' "$SECRET_SOURCE" | sha256sum | cut -d' ' -f1)
          echo "::add-mask::$BACKEND_SECRET_KEY"
          echo "secret_key=$BACKEND_SECRET_KEY" >> "$GITHUB_OUTPUT"

      - name: Deploy Backend to Cloud Run
        env:
          BACKEND_SECRET_KEY: ${{ steps.backend-secret-test.outputs.secret_key }}
        run: |
          gcloud run deploy aequitas-backend-test \
            --image europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-backend-test:${{ github.sha }} \
            --region europe-west6 \
            --platform managed \
            --set-env-vars SECRET_KEY=${BACKEND_SECRET_KEY} \
            --allow-unauthenticated

      - name: Build Frontend Image
        run: docker build -t europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-frontend-test:${{ github.sha }} ./frontend

      - name: Push Frontend Image
        run: docker push europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-frontend-test:${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy aequitas-frontend-test \
            --image europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-frontend-test:${{ github.sha }} \
            --region europe-west6 \
            --platform managed \
            --allow-unauthenticated

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/prod'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west6-docker.pkg.dev --quiet

      - name: Build Backend Image
        run: docker build -t europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-backend-prod:${{ github.sha }} ./backend

      - name: Push Backend Image
        run: docker push europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-backend-prod:${{ github.sha }}

      - name: Derive Backend Secret Key
        id: backend-secret-prod
        env:
          SECRET_SOURCE: ${{ secrets.DJANGO_SECRET_KEY || secrets.GCP_CREDENTIALS }}
        run: |
          BACKEND_SECRET_KEY=$(printf '%s' "$SECRET_SOURCE" | sha256sum | cut -d' ' -f1)
          echo "::add-mask::$BACKEND_SECRET_KEY"
          echo "secret_key=$BACKEND_SECRET_KEY" >> "$GITHUB_OUTPUT"

      - name: Deploy Backend to Cloud Run
        env:
          BACKEND_SECRET_KEY: ${{ steps.backend-secret-prod.outputs.secret_key }}
        run: |
          gcloud run deploy aequitas-backend \
            --image europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-backend-prod:${{ github.sha }} \
            --region europe-west6 \
            --platform managed \
            --set-env-vars SECRET_KEY=${BACKEND_SECRET_KEY} \
            --allow-unauthenticated

      - name: Build Frontend Image
        run: docker build -t europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-frontend-prod:${{ github.sha }} ./frontend

      - name: Push Frontend Image
        run: docker push europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-frontend-prod:${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy aequitas-frontend \
            --image europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aequitas/aequitas-frontend-prod:${{ github.sha }} \
            --region europe-west6 \
            --platform managed \
            --allow-unauthenticated
